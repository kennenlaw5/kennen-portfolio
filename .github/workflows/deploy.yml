name: Deploy to Render

run-name: Deploy ${{ github.sha }} to production

on:
  workflow_dispatch:

permissions:
  actions: read
  contents: read

concurrency:
  group: production-deployment
  cancel-in-progress: false

jobs:
  verify-ci:
    name: Verify successful CI
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Check CI result for selected commit
        env:
          DEPLOY_REF: ${{ github.sha }}
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          response=$(curl --fail-with-body --silent --show-error --location \
            --header "Accept: application/vnd.github+json" \
            --header "Authorization: Bearer ${GITHUB_TOKEN}" \
            --header "X-GitHub-Api-Version: 2026-03-10" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/actions/workflows/ci.yml/runs?branch=main&event=push&status=success&head_sha=${DEPLOY_REF}&per_page=1")

          ci_run_url=$(jq --raw-output '.workflow_runs[0].html_url // empty' <<< "$response")

          if [ -z "$ci_run_url" ]; then
            echo "::error::No successful main-branch CI run exists for ${DEPLOY_REF}. Wait for CI to finish or resolve its failures before deploying."
            exit 1
          fi

          echo "Verified successful CI run: ${ci_run_url}"

  deploy:
    name: Approve, deploy, and monitor
    needs: verify-ci
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment:
      name: production
      url: https://kennen.dev
    steps:
      - name: Validate protected Render configuration
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
        run: |
          if [ -z "$RENDER_DEPLOY_HOOK_URL" ]; then
            echo "::error::The production environment is missing RENDER_DEPLOY_HOOK_URL."
            exit 1
          fi

          if [ -z "$RENDER_API_KEY" ]; then
            echo "::error::The production environment is missing RENDER_API_KEY."
            exit 1
          fi

      - name: Trigger commit-specific Render deploy
        id: trigger_render_deploy
        env:
          RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
          DEPLOY_REF: ${{ github.sha }}
        run: |
          separator='?'
          if [[ "$RENDER_DEPLOY_HOOK_URL" == *\?* ]]; then
            separator='&'
          fi

          response_file=$(mktemp)
          http_status=$(curl --silent --show-error \
            --output "$response_file" \
            --write-out "%{http_code}" \
            --request POST \
            "${RENDER_DEPLOY_HOOK_URL}${separator}ref=${DEPLOY_REF}")

          if [ "$http_status" = "202" ]; then
            echo "::error::Render queued this deployment behind another deployment but did not return a deploy ID, so the workflow cannot monitor it safely. Check the Render dashboard for the queued deployment; rerun this workflow only if that deployment is canceled."
            exit 1
          fi

          if [ "$http_status" != "200" ]; then
            echo "::error::Render rejected the deploy request with HTTP ${http_status}."
            jq . "$response_file" 2>/dev/null || sed -n '1,20p' "$response_file"
            exit 1
          fi

          deploy_id=$(jq --raw-output '.deploy.id // empty' "$response_file")

          if [ -z "$deploy_id" ]; then
            echo "::error::Render accepted the deploy request but did not return a deploy ID."
            exit 1
          fi

          hook_path=${RENDER_DEPLOY_HOOK_URL%%\?*}
          service_id=${hook_path##*/}

          if [[ "$service_id" != srv-* ]]; then
            echo "::error::Unable to determine the Render service ID from RENDER_DEPLOY_HOOK_URL."
            exit 1
          fi

          render_deploy_url="https://dashboard.render.com/web/${service_id}/deploys/${deploy_id}"

          echo "deploy_id=${deploy_id}" >> "$GITHUB_OUTPUT"
          echo "service_id=${service_id}" >> "$GITHUB_OUTPUT"
          echo "deploy_url=${render_deploy_url}" >> "$GITHUB_OUTPUT"
          echo "::notice::Render started deployment ${deploy_id} for commit ${DEPLOY_REF}."
          {
            echo "### Render deployment triggered"
            echo "- Commit: \`${DEPLOY_REF}\`"
            echo "- Deploy: [\`${deploy_id}\`](${render_deploy_url})"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Wait for Render to report success
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          RENDER_SERVICE_ID: ${{ steps.trigger_render_deploy.outputs.service_id }}
          RENDER_DEPLOY_ID: ${{ steps.trigger_render_deploy.outputs.deploy_id }}
          RENDER_DEPLOY_URL: ${{ steps.trigger_render_deploy.outputs.deploy_url }}
        run: |
          previous_status=''
          consecutive_api_errors=0

          while true; do
            response_file=$(mktemp)

            if ! http_status=$(curl --silent --show-error \
              --output "$response_file" \
              --write-out "%{http_code}" \
              --header "Accept: application/json" \
              --header "Authorization: Bearer ${RENDER_API_KEY}" \
              "https://api.render.com/v1/services/${RENDER_SERVICE_ID}/deploys/${RENDER_DEPLOY_ID}"); then
              consecutive_api_errors=$((consecutive_api_errors + 1))
              echo "Render API request failed (${consecutive_api_errors}/12); retrying in 10 seconds."
            elif [ "$http_status" = "200" ]; then
              consecutive_api_errors=0
              render_status=$(jq --raw-output '.status // empty' "$response_file")

              if [ -z "$render_status" ]; then
                echo "::error::Render returned deployment details without a status."
                exit 1
              fi

              if [ "$render_status" != "$previous_status" ]; then
                echo "Render deployment ${RENDER_DEPLOY_ID} status: ${render_status}"
                previous_status=$render_status
              fi

              case "$render_status" in
                live)
                  echo "::notice::Render deployment ${RENDER_DEPLOY_ID} is live."
                  {
                    echo "### Render deployment complete"
                    echo "- Deploy: [\`${RENDER_DEPLOY_ID}\`](${RENDER_DEPLOY_URL})"
                    echo "- Status: **live**"
                  } >> "$GITHUB_STEP_SUMMARY"
                  exit 0
                  ;;
                deactivated|build_failed|update_failed|canceled|pre_deploy_failed)
                  echo "::error::Render deployment ${RENDER_DEPLOY_ID} finished with status ${render_status}."
                  exit 1
                  ;;
                created|queued|build_in_progress|update_in_progress|pre_deploy_in_progress)
                  ;;
                *)
                  echo "::error::Render deployment ${RENDER_DEPLOY_ID} returned the unknown status ${render_status}."
                  exit 1
                  ;;
              esac
            else
              consecutive_api_errors=$((consecutive_api_errors + 1))
              echo "Render API returned HTTP ${http_status} (${consecutive_api_errors}/12); retrying in 10 seconds."
            fi

            if [ "$consecutive_api_errors" -ge 12 ]; then
              echo "::error::Unable to retrieve the Render deployment status after 12 consecutive attempts."
              exit 1
            fi

            sleep 10
          done
